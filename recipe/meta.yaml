{% set name = "robotframework-lint" %}
{% set version = "1.1" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 2b5ac22ed59acbdf65f340ef3ddf10c7e88c9efd37cb03d7470d7c8e869cc0c1

build:
  noarch: python
  number: 1
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - rflint = rflint.__main__:main

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}
    - robotframework

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - rflint
  commands:
    - python -m pip check
    - rflint --help

about:
  home: https://github.com/boakley/robotframework-lint
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Linter for robot framework plain text files

extra:
  recipe-maintainers:
    - bollwyvl
